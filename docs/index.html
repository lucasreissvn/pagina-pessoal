<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 10px 0;
    }

    a {
      text-decoration: none;
      color: #0d6efd;
      font-size: 18px;
      transition: 0.2s;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Minha Página Pessoal</h1>

    <ul>
      <li><a href="bootstrap/index.html" target="_blank">Versão Bootstrap</a></li>
      <li><a href="w3css/index.html" target="_blank">Versão W3.CSS</a></li>
    </ul>
  </div>

</body>
</html>
